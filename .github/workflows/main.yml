name: CI/CD Warehouse

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, filter, hash, libxml, mbstring, openssl, pcre, pdo, session, tokenizer, xml
          tools: composer

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --ignore-platform-reqs --no-scripts

      - name: Check version
        run: php -v